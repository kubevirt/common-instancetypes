---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../linux

components:
  - ./metadata
  - ../requirements
  - ../../components/preferred-architecture/arm64
  - ../../components/required-architecture/arm64

patches:
  - target:
      kind: VirtualMachinePreference
    patch: |-
      - op: replace
        path: /metadata/name
        value: fedora.arm64
  - target:
      kind: VirtualMachineClusterPreference
    patch: |-
      - op: replace
        path: /metadata/name
        value: fedora.arm64
